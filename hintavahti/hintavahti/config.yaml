name: "Hintavahti"
version: "2.0.1"
slug: "hintavahti"
description: "Seuraa tuotteiden hintoja ja ilmoita kun ne laskevat. Sensorit HA:han ja sähköposti-ilmoitukset."
url: "https://github.com/your-username/hintavahti"
arch:
  - aarch64
  - amd64
init: false

# Embed the UI directly in the Home Assistant sidebar via Ingress.
ingress: true
ingress_port: 8000
panel_icon: mdi:tag-arrow-down
panel_title: "Hintavahti"

# Also expose the port for direct access (optional; set to null to disable).
ports:
  8000/tcp: 8000
ports_description:
  8000/tcp: "Web-käyttöliittymä (valinnainen suora pääsy)"

# Optional MQTT service: Supervisor provides broker credentials automatically
# if you run the Mosquitto broker add-on.
services:
  - mqtt:want

options:
  check_interval_hours: 6
  request_delay_seconds: 2
  playwright_enabled: true
  log_level: info
  smtp_host: ""
  smtp_port: 587
  smtp_user: ""
  smtp_pass: ""
  smtp_from: ""
  smtp_tls: true
  mqtt_enabled: false
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_pass: ""
  mqtt_tls: false

schema:
  check_interval_hours: float
  request_delay_seconds: float
  playwright_enabled: bool
  log_level: list(debug|info|warning|error)
  smtp_host: str?
  smtp_port: port
  smtp_user: str?
  smtp_pass: password?
  smtp_from: str?
  smtp_tls: bool
  mqtt_enabled: bool
  mqtt_host: str?
  mqtt_port: port
  mqtt_user: str?
  mqtt_pass: password?
  mqtt_tls: bool
