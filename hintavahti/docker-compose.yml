# Standalone use (ilman Home Assistantia). HA-käyttöön asenna add-on, älä tätä.
services:
  hintavahti:
    build: ./hintavahti
    container_name: hintavahti
    ports:
      - "8000:8000"
    volumes:
      - ./data:/data
    environment:
      CHECK_INTERVAL_HOURS: "6"
      REQUEST_DELAY_SECONDS: "2"
      PLAYWRIGHT_ENABLED: "true"
      LOG_LEVEL: "INFO"

      # Sähköposti (valinnainen): jätä SMTP_HOST tyhjäksi -> vain loki
      SMTP_HOST: ""
      SMTP_PORT: "587"
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: ""
      SMTP_TLS: "true"

      # MQTT / HA-sensorit (valinnainen)
      MQTT_ENABLED: "false"
      MQTT_HOST: ""
      MQTT_PORT: "1883"
      MQTT_USER: ""
      MQTT_PASS: ""
      MQTT_TLS: "false"
    restart: unless-stopped
