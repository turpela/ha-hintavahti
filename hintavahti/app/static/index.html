<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hintavahti</title>
<style>
  :root {
    --bg: #0f1419; --surface: #1a212b; --surface-2: #222c38; --border: #2c3845;
    --text: #e6edf3; --muted: #8b98a5; --accent: #3fb950; --warn: #d29922; --danger: #f0816a;
    --mono: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", Menlo, Consolas, monospace;
    --sans: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text); font-family: var(--sans);
    font-size: 15px; line-height: 1.5; -webkit-font-smoothing: antialiased; }
  a { color: inherit; }
  button { font-family: inherit; font-size: 14px; cursor: pointer; border: 1px solid var(--border);
    background: var(--surface-2); color: var(--text); border-radius: 8px; padding: 8px 14px;
    transition: background .15s, border-color .15s, transform .05s; }
  button:hover { background: #2a3543; border-color: #3a4856; }
  button:active { transform: translateY(1px); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #06210e; font-weight: 600; }
  button.primary:hover { background: #46c659; }
  button.ghost { background: transparent; }
  button.danger:hover { border-color: var(--danger); color: var(--danger); }
  input { font-family: inherit; font-size: 14px; background: var(--bg); border: 1px solid var(--border);
    color: var(--text); border-radius: 8px; padding: 9px 11px; width: 100%; }
  input:focus { outline: 2px solid var(--accent); outline-offset: -1px; }
  label { display: block; font-size: 12px; color: var(--muted); margin: 0 0 5px; }

  header { border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, #131922, var(--bg)); position: sticky; top: 0; z-index: 10; }
  .bar { max-width: 1100px; margin: 0 auto; padding: 16px 20px 0; }
  .brand { display: flex; align-items: baseline; gap: 10px; }
  .brand h1 { margin: 0; font-size: 20px; letter-spacing: .3px; font-weight: 650; }
  .brand .tag { color: var(--muted); font-size: 13px; }

  .tabs { display: flex; gap: 4px; margin-top: 14px; overflow-x: auto; }
  .tab { border: 1px solid transparent; border-bottom: none; background: transparent; color: var(--muted);
    border-radius: 9px 9px 0 0; padding: 9px 16px; white-space: nowrap; font-size: 14px; }
  .tab:hover { color: var(--text); background: var(--surface); }
  .tab.active { color: var(--text); background: var(--surface); border-color: var(--border);
    position: relative; bottom: -1px; }
  .tab.add { color: var(--muted); }

  main { max-width: 1100px; margin: 0 auto; padding: 22px 20px 60px; }
  .toolbar { display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end;
    justify-content: space-between; margin-bottom: 22px; }
  .email-edit { display: flex; gap: 8px; align-items: flex-end; flex: 1; min-width: 260px; max-width: 460px; }
  .email-edit > div { flex: 1; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 16px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 18px;
    display: flex; flex-direction: column; gap: 12px; animation: rise .25s ease both; }
  @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .card.dropped { border-color: rgba(63,185,80,.5); box-shadow: 0 0 0 1px rgba(63,185,80,.25); }
  .card.error { border-color: rgba(240,129,106,.45); }
  .card .top { display: flex; justify-content: space-between; gap: 10px; }
  .card .pname { font-weight: 600; font-size: 15px; word-break: break-word; }
  .card .pname a { text-decoration: none; }
  .card .pname a:hover { text-decoration: underline; }
  .js-tag { font-size: 10px; color: var(--muted); border: 1px solid var(--border);
    border-radius: 5px; padding: 1px 5px; margin-left: 6px; vertical-align: middle; }

  .price-row { display: flex; align-items: baseline; gap: 10px; }
  .price { font-family: var(--mono); font-size: 30px; font-weight: 600;
    font-variant-numeric: tabular-nums; letter-spacing: -.5px; }
  .delta { font-family: var(--mono); font-size: 13px; font-variant-numeric: tabular-nums; }
  .delta.down { color: var(--accent); } .delta.up { color: var(--danger); } .delta.flat { color: var(--muted); }
  .spark { width: 100%; height: 46px; }
  .meta { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 14px; font-size: 12.5px; color: var(--muted); }
  .meta b { color: var(--text); font-weight: 500; font-family: var(--mono); font-variant-numeric: tabular-nums; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 20px; }
  .badge.drop { background: rgba(63,185,80,.15); color: var(--accent); }
  .badge.target { background: rgba(210,153,34,.15); color: var(--warn); }
  .badge.err { background: rgba(240,129,106,.15); color: var(--danger); }
  .card-actions { display: flex; gap: 8px; margin-top: 2px; }
  .card-actions button { padding: 7px 12px; font-size: 13px; flex: 1; }

  .empty { text-align: center; color: var(--muted); padding: 70px 20px; }
  .empty h2 { color: var(--text); font-weight: 600; margin: 0 0 8px; }

  .overlay { position: fixed; inset: 0; background: rgba(5,8,12,.7); display: none;
    align-items: center; justify-content: center; padding: 20px; z-index: 50; }
  .overlay.show { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px;
    width: 100%; max-width: 460px; padding: 22px; }
  .modal h3 { margin: 0 0 16px; font-size: 17px; }
  .modal .field { margin-bottom: 14px; }
  .modal .hint { font-size: 12px; color: var(--muted); margin-top: 5px; }
  .check-row { display: flex; align-items: center; gap: 9px; }
  .check-row input { width: auto; }
  .check-row label { margin: 0; font-size: 14px; color: var(--text); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 8px; }

  .toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%) translateY(80px);
    background: var(--surface-2); border: 1px solid var(--border); color: var(--text);
    padding: 12px 18px; border-radius: 10px; font-size: 14px; z-index: 60;
    transition: transform .25s ease; max-width: 90vw; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.good { border-color: var(--accent); } .toast.bad { border-color: var(--danger); }

  @media (max-width: 560px) { .meta { grid-template-columns: 1fr; } .price { font-size: 26px; } }
  @media (prefers-reduced-motion: reduce) { .card { animation: none; } .toast { transition: none; } }
</style>
</head>
<body>
<header>
  <div class="bar">
    <div class="brand">
      <h1>Hintavahti</h1>
      <span class="tag">seuraa hintoja, saa ilmoitus kun ne laskevat</span>
    </div>
    <div class="tabs" id="tabs"></div>
  </div>
</header>

<main>
  <div class="toolbar" id="toolbar" style="display:none">
    <div class="email-edit">
      <div>
        <label for="emailInput">Ilmoitussähköposti tälle välilehdelle</label>
        <input id="emailInput" type="email" placeholder="nimi@esimerkki.fi">
      </div>
      <button id="saveEmailBtn">Tallenna</button>
    </div>
    <div style="display:flex; gap:8px;">
      <button class="ghost danger" id="deleteTabBtn">Poista välilehti</button>
      <button class="primary" id="addProductBtn">+ Lisää tuote</button>
    </div>
  </div>
  <div id="content"></div>
</main>

<div class="overlay" id="productOverlay">
  <div class="modal">
    <h3 id="productModalTitle">Lisää tuote</h3>
    <div class="field">
      <label for="pName">Nimi</label>
      <input id="pName" placeholder="esim. Kuulokkeet XYZ">
    </div>
    <div class="field">
      <label for="pUrl">Tuotteen linkki</label>
      <input id="pUrl" placeholder="https://...">
    </div>
    <div class="field">
      <label for="pTarget">Tavoitehinta € (valinnainen)</label>
      <input id="pTarget" type="number" step="0.01" placeholder="ilmoita vasta tämän alle">
      <div class="hint">Jos tyhjä, ilmoitus tulee aina kun hinta laskee edellisestä.</div>
    </div>
    <div class="field check-row">
      <input id="pUseJs" type="checkbox">
      <label for="pUseJs">Renderöi sivu selaimella (JS)</label>
    </div>
    <div class="hint" style="margin:-8px 0 14px">Ota käyttöön, jos hinta latautuu vasta JavaScriptillä eikä löydy muuten.</div>
    <div class="field">
      <label for="pSelector">CSS-valitsin (valinnainen)</label>
      <input id="pSelector" placeholder="esim. .product-price">
      <div class="hint">Tunnetuille kaupoille on valmiit valitsimet; lisää oma vain jos hinta ei löydy.</div>
    </div>
    <div class="modal-actions">
      <button class="ghost" id="productCancel">Peruuta</button>
      <button class="primary" id="productSave">Tallenna</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// Relative paths so the app works both standalone and behind HA Ingress.
const api = async (path, opts = {}) => {
  const res = await fetch(path.replace(/^\//, ""), {
    headers: { "Content-Type": "application/json" }, ...opts,
  });
  if (!res.ok) {
    let msg = "Virhe " + res.status;
    try { const j = await res.json(); if (j.detail) msg = j.detail; } catch (e) {}
    throw new Error(msg);
  }
  return res.status === 204 ? null : res.json();
};

let watchers = [], activeId = null, products = [], editingProductId = null;
const $ = (id) => document.getElementById(id);

function fmt(v) { return (v === null || v === undefined) ? "—" : v.toFixed(2).replace(".", ",") + " €"; }
function fmtDate(iso) {
  if (!iso) return "ei vielä tarkistettu";
  return new Date(iso).toLocaleString("fi-FI", { day: "numeric", month: "numeric", hour: "2-digit", minute: "2-digit" });
}
let toastTimer;
function toast(msg, kind = "") {
  const t = $("toast"); t.textContent = msg; t.className = "toast show " + kind;
  clearTimeout(toastTimer); toastTimer = setTimeout(() => { t.className = "toast " + kind; }, 3200);
}

async function loadWatchers() {
  watchers = await api("api/watchers");
  if (!activeId && watchers.length) activeId = watchers[0].id;
  if (activeId && !watchers.find((w) => w.id === activeId)) activeId = watchers.length ? watchers[0].id : null;
  renderTabs();
  if (activeId) await loadProducts(); else renderEmptyAccount();
}
function renderTabs() {
  const el = $("tabs"); el.innerHTML = "";
  watchers.forEach((w) => {
    const b = document.createElement("button");
    b.className = "tab" + (w.id === activeId ? " active" : "");
    b.textContent = w.name;
    b.onclick = () => { activeId = w.id; renderTabs(); loadProducts(); };
    el.appendChild(b);
  });
  const add = document.createElement("button");
  add.className = "tab add"; add.textContent = "+ Uusi välilehti"; add.onclick = addWatcher;
  el.appendChild(add);
}
async function addWatcher() {
  const name = prompt("Välilehden nimi (esim. henkilön nimi):");
  if (!name || !name.trim()) return;
  try {
    const w = await api("api/watchers", { method: "POST", body: JSON.stringify({ name: name.trim(), email: "" }) });
    activeId = w.id; await loadWatchers(); toast("Välilehti luotu", "good");
  } catch (e) { toast(e.message, "bad"); }
}
async function saveEmail() {
  const w = watchers.find((x) => x.id === activeId); if (!w) return;
  try {
    await api("api/watchers/" + activeId, { method: "PUT", body: JSON.stringify({ name: w.name, email: $("emailInput").value.trim() }) });
    toast("Sähköposti tallennettu", "good"); await loadWatchers();
  } catch (e) { toast(e.message, "bad"); }
}
async function deleteWatcher() {
  const w = watchers.find((x) => x.id === activeId); if (!w) return;
  if (!confirm(`Poistetaanko välilehti "${w.name}" ja kaikki sen tuotteet?`)) return;
  try { await api("api/watchers/" + activeId, { method: "DELETE" }); activeId = null; await loadWatchers(); toast("Välilehti poistettu"); }
  catch (e) { toast(e.message, "bad"); }
}

async function loadProducts() {
  $("toolbar").style.display = "flex";
  const w = watchers.find((x) => x.id === activeId);
  $("emailInput").value = w ? w.email : "";
  try { products = await api(`api/watchers/${activeId}/products`); renderProducts(); }
  catch (e) { toast(e.message, "bad"); }
}

function sparkline(history) {
  const prices = history.map((h) => h.price);
  if (prices.length < 2) return `<svg class="spark"></svg>`;
  const min = Math.min(...prices), max = Math.max(...prices), range = max - min || 1;
  const W = 260, H = 46, pad = 3, step = (W - pad * 2) / (prices.length - 1);
  const pts = prices.map((p, i) => `${(pad + i * step).toFixed(1)},${(H - pad - ((p - min) / range) * (H - pad * 2)).toFixed(1)}`);
  const last = prices[prices.length - 1], first = prices[0];
  const color = last < first ? "var(--accent)" : last > first ? "var(--danger)" : "var(--muted)";
  return `<svg class="spark" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
    <polyline points="${pad},${H} ${pts.join(" ")} ${(W - pad)},${H}" fill="${color}" opacity="0.10" stroke="none"/>
    <polyline points="${pts.join(" ")}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

function renderProducts() {
  const c = $("content");
  if (!products.length) {
    c.innerHTML = `<div class="empty"><h2>Ei vielä seurattavia tuotteita</h2>
      <p>Lisää ensimmäinen linkki painikkeesta “+ Lisää tuote”.</p></div>`;
    return;
  }
  const grid = document.createElement("div"); grid.className = "grid";
  products.forEach((p) => grid.appendChild(productCard(p)));
  c.innerHTML = ""; c.appendChild(grid);
}

function productCard(p) {
  const card = document.createElement("div");
  const hist = p.history || [];
  const prev = hist.length >= 2 ? hist[hist.length - 2].price : null;
  const dropped = prev !== null && p.last_price !== null && p.last_price < prev;
  const belowTarget = p.target_price != null && p.last_price != null && p.last_price <= p.target_price;
  let cls = "card";
  if (p.last_error) cls += " error"; else if (dropped || belowTarget) cls += " dropped";
  card.className = cls;

  let delta = `<span class="delta flat">—</span>`;
  if (prev !== null && p.last_price !== null) {
    const diff = p.last_price - prev, pct = prev ? (diff / prev) * 100 : 0;
    const dir = diff < 0 ? "down" : diff > 0 ? "up" : "flat";
    const sign = diff < 0 ? "▼ " : diff > 0 ? "▲ " : "";
    delta = `<span class="delta ${dir}">${sign}${Math.abs(pct).toFixed(1)} %</span>`;
  }
  let badge = "";
  if (p.last_error) badge = `<span class="badge err">virhe</span>`;
  else if (belowTarget) badge = `<span class="badge target">tavoitehinnassa</span>`;
  else if (dropped) badge = `<span class="badge drop">hinta laski</span>`;

  card.innerHTML = `
    <div class="top">
      <div class="pname"><a href="${escapeHtml(p.url)}" target="_blank" rel="noopener">${escapeHtml(p.name)}</a>${p.use_js ? '<span class="js-tag">JS</span>' : ''}</div>
      ${badge}
    </div>
    <div class="price-row"><span class="price">${fmt(p.last_price)}</span>${delta}</div>
    ${sparkline(hist)}
    <div class="meta">
      <span>Alin: <b>${fmt(p.lowest_price)}</b></span>
      <span>Tavoite: <b>${p.target_price != null ? fmt(p.target_price) : "—"}</b></span>
      <span>Tarkistettu: <b>${fmtDate(p.last_checked)}</b></span>
      <span>Mittauksia: <b>${hist.length}</b></span>
    </div>
    ${p.last_error ? `<div style="color:var(--danger);font-size:12.5px">${escapeHtml(p.last_error)}</div>` : ""}
    <div class="card-actions">
      <button data-act="check">Tarkista nyt</button>
      <button class="ghost" data-act="edit">Muokkaa</button>
      <button class="ghost danger" data-act="del">Poista</button>
    </div>`;
  card.querySelector('[data-act="check"]').onclick = () => checkNow(p.id);
  card.querySelector('[data-act="edit"]').onclick = () => openProductModal(p);
  card.querySelector('[data-act="del"]').onclick = () => deleteProduct(p);
  return card;
}

async function checkNow(id) {
  toast("Tarkistetaan…");
  try {
    const data = await api(`api/products/${id}/check`, { method: "POST" });
    await loadProducts();
    const r = data.result;
    if (r.error) toast("Tarkistus epäonnistui: " + r.error, "bad");
    else if (r.notified) toast("Hinta laski — ilmoitus käsitelty", "good");
    else toast("Tarkistettu: " + fmt(r.price), "good");
  } catch (e) { toast(e.message, "bad"); }
}
async function deleteProduct(p) {
  if (!confirm(`Poistetaanko "${p.name}"?`)) return;
  try { await api(`api/products/${p.id}`, { method: "DELETE" }); await loadProducts(); toast("Tuote poistettu"); }
  catch (e) { toast(e.message, "bad"); }
}

function openProductModal(p = null) {
  editingProductId = p ? p.id : null;
  $("productModalTitle").textContent = p ? "Muokkaa tuotetta" : "Lisää tuote";
  $("pName").value = p ? p.name : "";
  $("pUrl").value = p ? p.url : "";
  $("pTarget").value = p && p.target_price != null ? p.target_price : "";
  $("pUseJs").checked = p ? !!p.use_js : false;
  $("pSelector").value = p ? p.css_selector : "";
  $("productOverlay").classList.add("show"); $("pName").focus();
}
function closeProductModal() { $("productOverlay").classList.remove("show"); editingProductId = null; }

async function saveProduct() {
  const name = $("pName").value.trim(), url = $("pUrl").value.trim();
  if (!name || !url) { toast("Anna nimi ja linkki", "bad"); return; }
  const targetRaw = $("pTarget").value.trim();
  const body = {
    name, url, css_selector: $("pSelector").value.trim(), use_js: $("pUseJs").checked,
    target_price: targetRaw === "" ? null : parseFloat(targetRaw.replace(",", ".")),
  };
  try {
    if (editingProductId) {
      await api(`api/products/${editingProductId}`, { method: "PUT", body: JSON.stringify(body) });
      toast("Tuote päivitetty", "good");
    } else {
      body.watcher_id = activeId;
      toast("Lisätään ja haetaan hinta…");
      await api("api/products", { method: "POST", body: JSON.stringify(body) });
      toast("Tuote lisätty", "good");
    }
    closeProductModal(); await loadProducts();
  } catch (e) { toast(e.message, "bad"); }
}

function renderEmptyAccount() {
  $("toolbar").style.display = "none";
  $("content").innerHTML = `<div class="empty">
    <h2>Tervetuloa Hintavahtiin</h2>
    <p>Luo ensimmäinen välilehti (esim. oma nimesi), niin voit alkaa lisätä seurattavia tuotteita.</p>
    <p style="margin-top:18px"><button class="primary" onclick="addWatcher()">+ Luo välilehti</button></p>
  </div>`;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, (m) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[m]));
}

$("saveEmailBtn").onclick = saveEmail;
$("deleteTabBtn").onclick = deleteWatcher;
$("addProductBtn").onclick = () => openProductModal();
$("productCancel").onclick = closeProductModal;
$("productSave").onclick = saveProduct;
$("productOverlay").onclick = (e) => { if (e.target.id === "productOverlay") closeProductModal(); };

loadWatchers();
</script>
</body>
</html>
